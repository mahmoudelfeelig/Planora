name: planora

services:
  planora-api:
    container_name: planora-api
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      PLANORA_DB_PATH: /app/data/planora.sqlite3
      PLANORA_PRODUCTION: "1"
      PLANORA_DOMAIN: ${PLANORA_DOMAIN}
      PLANORA_AUTH_SECRET: ${PLANORA_AUTH_SECRET}
      PLANORA_AUTH_ISSUER: ${PLANORA_AUTH_ISSUER:-planora}
      PLANORA_AUTH_AUDIENCE: ${PLANORA_AUTH_AUDIENCE:-planora-web}
      PLANORA_ALLOWED_ORIGINS: https://${PLANORA_DOMAIN}
      PLANORA_TRUST_DEV_HEADERS: "0"
      PLANORA_SESSION_TTL_SECONDS: ${PLANORA_SESSION_TTL_SECONDS:-28800}
      PLANORA_REQUIRE_AUTH_SESSION_RECORD: ${PLANORA_REQUIRE_AUTH_SESSION_RECORD:-0}
      PLANORA_MAX_REQUEST_BYTES: ${PLANORA_MAX_REQUEST_BYTES:-20971520}
      PLANORA_RATE_LIMIT_PER_MINUTE: ${PLANORA_RATE_LIMIT_PER_MINUTE:-120}
      PLANORA_RATE_LIMIT_ANONYMOUS_PER_MINUTE: ${PLANORA_RATE_LIMIT_ANONYMOUS_PER_MINUTE:-120}
      PLANORA_RATE_LIMIT_AUTHENTICATED_PER_MINUTE: ${PLANORA_RATE_LIMIT_AUTHENTICATED_PER_MINUTE:-1200}
      PLANORA_RATE_LIMIT_AUTH_PER_MINUTE: ${PLANORA_RATE_LIMIT_AUTH_PER_MINUTE:-20}
      PLANORA_RATE_LIMIT_TELEMETRY_PER_MINUTE: ${PLANORA_RATE_LIMIT_TELEMETRY_PER_MINUTE:-600}
      PLANORA_MAX_ANALYTICS_REQUEST_BYTES: ${PLANORA_MAX_ANALYTICS_REQUEST_BYTES:-32768}
      PLANORA_JOB_WORKERS: ${PLANORA_JOB_WORKERS:-2}
      PLANORA_MAX_ACTIVE_JOBS_PER_TENANT: ${PLANORA_MAX_ACTIVE_JOBS_PER_TENANT:-2}
      PLANORA_MAX_MEMORY_SESSIONS: ${PLANORA_MAX_MEMORY_SESSIONS:-128}
      PLANORA_MAX_MEMORY_JOBS: ${PLANORA_MAX_MEMORY_JOBS:-128}
      PLANORA_MAX_PERSISTED_SESSIONS_PER_TENANT: ${PLANORA_MAX_PERSISTED_SESSIONS_PER_TENANT:-100}
      PLANORA_MAX_PERSISTED_JOBS_PER_TENANT: ${PLANORA_MAX_PERSISTED_JOBS_PER_TENANT:-500}
      PLANORA_MAX_PROJECTS_PER_TENANT: ${PLANORA_MAX_PROJECTS_PER_TENANT:-200}
      PLANORA_MAX_PROGRESS_EVENTS: ${PLANORA_MAX_PROGRESS_EVENTS:-1000}
      PLANORA_NETDATA_URL: ${PLANORA_NETDATA_URL:-}
      PLANORA_REGISTRATION_ENABLED: ${PLANORA_REGISTRATION_ENABLED:-1}
      PLANORA_EMAIL_VERIFICATION_REQUIRED: ${PLANORA_EMAIL_VERIFICATION_REQUIRED:-1}
      PLANORA_TOKEN_PEPPER: ${PLANORA_TOKEN_PEPPER}
      PLANORA_PUBLIC_BASE_URL: https://${PLANORA_DOMAIN}
      PLANORA_SMTP_HOST: ${PLANORA_SMTP_HOST}
      PLANORA_SMTP_PORT: ${PLANORA_SMTP_PORT:-587}
      PLANORA_SMTP_USERNAME: ${PLANORA_SMTP_USERNAME}
      PLANORA_SMTP_PASSWORD: ${PLANORA_SMTP_PASSWORD}
      PLANORA_SMTP_FROM: ${PLANORA_SMTP_FROM}
      PLANORA_SMTP_STARTTLS: ${PLANORA_SMTP_STARTTLS:-1}
      PLANORA_RETENTION_DAYS: ${PLANORA_RETENTION_DAYS:-183}
    volumes:
      - planora-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/ready', timeout=3).read(); req=urllib.request.Request('http://127.0.0.1:8787/ready', method='HEAD'); urllib.request.urlopen(req, timeout=3).close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    cpus: ${PLANORA_API_CPUS:-2.0}
    mem_limit: ${PLANORA_API_MEMORY:-3g}
    pids_limit: ${PLANORA_API_PIDS:-256}

  planora-web:
    container_name: planora-web
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        VITE_PLANORA_API_URL: /api
    restart: unless-stopped
    environment:
      PLANORA_DOMAIN: ${PLANORA_DOMAIN}
      PLANORA_TLS_EMAIL: ${PLANORA_TLS_EMAIL}
    depends_on:
      planora-api:
        condition: service_healthy
    networks:
      default:
      web:
        aliases:
          - planora-web

  planora-backup:
    container_name: planora-backup
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "scripts/backup_planora.py", "--source", "/app/data/planora.sqlite3", "--destination-dir", "/backups", "--watch-seconds", "21600", "--keep", "${PLANORA_BACKUP_KEEP_COUNT:-800}", "--keep-days", "${PLANORA_BACKUP_KEEP_DAYS:-183}"]
    depends_on:
      planora-api:
        condition: service_healthy
    volumes:
      - planora-data:/app/data:ro
      - planora-backups:/backups
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  planora-retention:
    container_name: planora-retention
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "scripts/retention_planora.py", "--database", "/app/data/planora.sqlite3", "--keep-days", "${PLANORA_RETENTION_DAYS:-183}", "--watch-seconds", "86400"]
    depends_on:
      planora-api:
        condition: service_healthy
    volumes:
      - planora-data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  planora-data:
    name: planora-data
  planora-backups:
    name: planora-backups

networks:
  web:
    external: true
